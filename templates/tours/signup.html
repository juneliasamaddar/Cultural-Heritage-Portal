{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Create Account</h2>

    <form method="POST" class="card p-4 shadow">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success w-100">
            Sign Up
        </button>
    </form>
</div>
{% endblock %}
