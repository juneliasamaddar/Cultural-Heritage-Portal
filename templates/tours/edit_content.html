{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>Edit Content</h2>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Update
        </button>
    </form>
</div>
{% endblock %}
